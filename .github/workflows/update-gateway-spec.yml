name: Update OpenAPI Spec in Gateway

on:
  workflow_run:
    workflows: ["Pipeline"]
    types:
      - completed
    branches: [main]

env:
  SERVICE_NAME: ms-workspace-management
  GATEWAY_REPO: CassioCintra/gateway
  GATEWAY_BRANCH: development
  JAVA_VERSION: '25'

jobs:
  update-spec:
    name: Generate and push OpenAPI spec
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout microservice
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5.2.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Generate OpenAPI spec
        run: ./mvnw test -Dtest=OpenApiSpecGeneratorTest

      - name: Checkout gateway
        uses: actions/checkout@v6.0.2
        with:
          repository: ${{ env.GATEWAY_REPO }}
          token: ${{ secrets.GATEWAY_PAT }}
          path: gateway

      - name: Verify if the spec changes
        id: diff
        run: |
          CURRENT="gateway/src/main/resources/static/openapi/${{ env.SERVICE_NAME }}.yaml"
          if cmp -s target/openapi.yaml "$CURRENT"; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Copy spec upgraded
        if: steps.diff.outputs.changed == 'true'
        run: |
          cp target/openapi.yaml \
            gateway/src/main/resources/static/openapi/${{ env.SERVICE_NAME }}.yaml

      - name: Open PR on Gateway repository
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          token: ${{ secrets.GATEWAY_PAT }}
          path: gateway
          base: ${{ env.GATEWAY_BRANCH }}
          branch: openapi/${{ env.SERVICE_NAME }}
          commit-message: "docs(openapi): update ${{ env.SERVICE_NAME }} spec"
          title: "docs(openapi): update ${{ env.SERVICE_NAME }} OpenAPI spec"
          body: |
            Atualização automática do spec OpenAPI de `${{ env.SERVICE_NAME }}`.

            **Commit de origem:** ${{ github.event.workflow_run.head_sha }}
            **Repositório:** ${{ github.repository }}
          labels: |
            documentation
            automated
